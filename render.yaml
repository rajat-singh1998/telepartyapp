services:
  - type: web
    name: teleparty-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          type: web
          name: teleparty-server
          envVarKey: RENDER_EXTERNAL_URL
  - type: web
    name: teleparty-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DISCONNECT_GRACE_MS
        value: "45000"
      - key: CLIENT_ORIGIN
        sync: false
